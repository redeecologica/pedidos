; Valores espelhando produção — phpinfo capturado 2026-06-11 (docs/ambiente-producao.md)
date.timezone = America/Sao_Paulo
short_open_tag = On
max_input_vars = 9000
memory_limit = 256M
max_execution_time = 300
upload_max_filesize = 768M
post_max_size = 768M
; produção roda com session.auto_start=Off (README antigo pedia On — desatualizado);
; o código chama session_start() explicitamente em common.inc.php

; Visibilidade de erros em DEV
display_errors = On
log_errors = On
; equivale a 22519 — exatamente o error_reporting efetivo de produção
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED
